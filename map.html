<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Complaint Map – CivicEye</title>
  <meta name="description" content="Interactive live map showing all civic complaints with real-time status, clustering, and filtering." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <!-- heatmap -->
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <style>
    .map-page {
      display: flex;
      height: calc(100vh - var(--nav-height));
      overflow: hidden;
      margin-top: var(--nav-height);
      position: relative;
    }

    /* Sidebar */
    .map-sidebar {
      width: 340px;
      height: 100%;
      overflow-y: auto;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border-right: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      z-index: 10;
    }
    .map-sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--glass-bg);
      position: sticky; top: 0;
      backdrop-filter: var(--glass-blur);
      z-index: 2;
    }
    .map-sidebar-body { padding: 14px; flex: 1; overflow-y: auto; }

    /* Map area */
    #mainMap { flex: 1; height: 100%; }

    /* Filter chips */
    .filter-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .filter-chip {
      padding: 5px 12px;
      border-radius: var(--radius-full);
      font-size: 0.78rem; font-weight: 600;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      transition: var(--transition-fast);
      color: var(--text-muted);
    }
    .filter-chip:hover, .filter-chip.active { border-color: var(--secondary); background: rgba(79,70,229,0.10); color: var(--secondary); }
    .filter-chip.severity-high.active  { border-color: #EF4444; background: rgba(239,68,68,0.10); color: #B91C1C; }
    .filter-chip.severity-medium.active { border-color: #F59E0B; background: rgba(245,158,11,0.10); color: #B45309; }
    .filter-chip.severity-low.active  { border-color: #22C55E; background: rgba(34,197,94,0.10); color: #15803D; }

    /* Complaint mini cards in sidebar */
    .complaint-mini {
      padding: 13px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.50);
      margin-bottom: 8px;
      cursor: pointer;
      transition: var(--transition-fast);
    }
    [data-theme="dark"] .complaint-mini { background: rgba(15,23,42,0.50); }
    .complaint-mini:hover {
      border-color: var(--secondary);
      background: rgba(79,70,229,0.05);
      transform: translateX(3px);
    }

    /* Stats bar */
    .map-stats-bar {
      position: absolute;
      top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 1000;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-full);
      padding: 10px 26px;
      box-shadow: var(--shadow-lg);
      display: flex; gap: 28px;
      white-space: nowrap;
    }
    .map-stat     { text-align: center; }
    .map-stat-val { font-weight: 900; font-size: 1.1rem; font-family: 'Poppins',sans-serif; line-height: 1; }
    .map-stat-lbl { font-size: 0.68rem; color: var(--text-muted); font-weight: 500; margin-top: 2px; }

    /* Legend */
    .map-legend {
      position: absolute;
      bottom: 32px; left: 360px;
      z-index: 1000;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      box-shadow: var(--shadow-lg);
    }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 7px; }
    .legend-dot  { width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; box-shadow: 0 1px 4px rgba(0,0,0,0.25); flex-shrink: 0; }

    /* FABs */
    .map-fabs {
      position: absolute;
      bottom: 32px; right: 24px;
      z-index: 1000;
      display: flex; flex-direction: column; gap: 10px;
    }
    .fab-btn {
      width: 50px; height: 50px;
      border-radius: 50%; border: none;
      cursor: pointer;
      box-shadow: var(--shadow-lg);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      transition: var(--transition);
    }
    .fab-btn:hover { transform: scale(1.12); box-shadow: var(--shadow-xl); }
    .fab-btn:active { transform: scale(0.95); }

    @media (max-width: 768px) {
      .map-sidebar   { display: none; }
      .map-legend    { left: 16px; }
    }
    @media (max-width: 480px) {
      .map-stats-bar { display: none; }
    }

    /* Priority badge */
    .priority-badge {
      display:inline-flex; align-items:center; gap:3px;
      padding:2px 8px; border-radius:20px;
      font-size:0.64rem; font-weight:800;
      background:linear-gradient(135deg,#4F46E5,#14B8A6);
      color:white; letter-spacing:0.03em;
      box-shadow:0 2px 8px rgba(79,70,229,0.25);
    }
    /* Boost popup button */
    .map-boost-btn {
      display:inline-flex; align-items:center; gap:5px;
      padding:6px 14px; border-radius:9px;
      background:linear-gradient(135deg,rgba(20,184,166,0.12),rgba(79,70,229,0.10));
      border:1.5px solid rgba(20,184,166,0.35);
      color:var(--accent,#14B8A6); font-size:0.78rem; font-weight:700;
      cursor:pointer; transition:all 0.2s;
      font-family:'Inter',sans-serif; margin-top:10px; width:100%;
      justify-content:center;
    }
    .map-boost-btn:hover { background:linear-gradient(135deg,#14B8A6,#4F46E5); color:white; border-color:transparent; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="nav-logo"><div class="nav-logo-icon">👁️</div><span class="nav-logo-text">CivicEye</span><span class="nav-logo-tag">BETA</span></a>
    <div class="nav-links">
      <a href="index.html"     class="nav-link">🏠 Home</a>
      <a href="map.html"       class="nav-link active">🗺️ Live Map</a>
      <a href="report.html"    class="nav-link">📋 Report</a>
      <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
      <a href="community.html" class="nav-link">🗳️ Community</a>
      <a href="tracker.html"   class="nav-link">📡 Tracker</a>
    </div>
    <div class="nav-actions">
      <button class="dark-toggle">🌙</button>
      <a href="profile.html" class="nav-avatar">R</a>
      <a href="report.html" class="btn btn-primary btn-sm btn-ripple">+ Report</a>
      <button class="nav-hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>
<div id="toast-container"></div>

<div class="map-page">
  <!-- SIDEBAR -->
  <div class="map-sidebar">
    <div class="map-sidebar-header">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div>
          <h2 style="font-size:1rem;font-weight:800;margin-bottom:2px;">🗺️ Live Issue Map</h2>
          <p style="font-size:0.78rem;color:var(--text-muted);">Click a pin for details</p>
        </div>
        <span style="display:flex;align-items:center;gap:5px;font-size:0.72rem;font-weight:700;background:rgba(34,197,94,0.12);color:#15803D;border:1px solid rgba(34,197,94,0.25);padding:3px 10px;border-radius:20px;">
          <span style="width:7px;height:7px;border-radius:50%;background:#22C55E;display:inline-block;animation:pulse 2s infinite;"></span> Live
        </span>
      </div>
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchComplaints" placeholder="Search complaints..." />
      </div>
      <div class="filter-chips" id="filterChips">
        <button class="filter-chip active"                data-filter="all">All</button>
        <button class="filter-chip severity-high"         data-filter="high">🔴 High</button>
        <button class="filter-chip severity-medium"       data-filter="medium">🟠 Medium</button>
        <button class="filter-chip severity-low"          data-filter="low">🟢 Low</button>
      </div>
    </div>
    <div class="map-sidebar-body">
      <div style="font-size:0.72rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">
        Complaints (<span id="complaintCount">6</span>)
      </div>
      <div id="complaintList"></div>
    </div>
  </div>

  <!-- MAP AREA -->
  <div style="flex:1;position:relative;">
    <div id="mainMap"></div>

    <!-- Stats bar -->
    <div class="map-stats-bar">
      <div class="map-stat"><div class="map-stat-val" style="color:var(--primary);" id="statTotal">0</div><div class="map-stat-lbl">Total</div></div>
      <div class="map-stat"><div class="map-stat-val" style="color:#EF4444;" id="statHigh">0</div><div class="map-stat-lbl">High</div></div>
      <div class="map-stat"><div class="map-stat-val" style="color:#F59E0B;" id="statMedium">0</div><div class="map-stat-lbl">Medium</div></div>
      <div class="map-stat"><div class="map-stat-val" style="color:#22C55E;" id="statLow">0</div><div class="map-stat-lbl">Low</div></div>
    </div>

    <!-- Legend -->
    <div class="map-legend">
      <div style="font-weight:700;font-size:0.82rem;margin-bottom:10px;">📍 Severity Legend</div>
      <div class="legend-item"><div class="legend-dot" style="background:#EF4444;"></div>High</div>
      <div class="legend-item"><div class="legend-dot" style="background:#F59E0B;"></div>Medium</div>
      <div class="legend-item"><div class="legend-dot" style="background:#22C55E;"></div>Low</div>
      <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);font-size:0.72rem;color:var(--text-muted);">
        Border: <span style="color:#15803D;font-weight:700;">Green</span>=Verified ·
        <span style="color:#B91C1C;font-weight:700;">Red</span>=Suspicious
      </div>
    </div>

    <!-- FABs -->
    <div class="map-fabs">
      <button class="fab-btn btn-ripple" style="background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;" title="My Location" onclick="locateMe()">📡</button>
      <button class="fab-btn" style="background:var(--glass-bg);border:1px solid var(--border);" title="Report Issue" onclick="window.location.href='report.html'">📋</button>
      <button class="fab-btn" style="background:var(--glass-bg);border:1px solid var(--border);" title="Toggle Heatmap" onclick="toggleHeatmap()">🔥</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script type="module" src="js/app.js"></script>
<script src="js/map.js"></script>
<script>
  let currentFilter = 'all';
  let searchQuery   = '';

  function getStatusIcon(status) {
    return { pending:'🟡', resolved:'🟢', delayed:'🔴', processing:'🔵' }[status] || '⚪';
  }

  function getSeverityColor(severity) {
    return { high:'#B91C1C', medium:'#B45309', low:'#15803D' }[severity] || '#6B7280';
  }

  function renderSidebarList(data) {
    const list = document.getElementById('complaintList');
    const items = data.filter(c => {
      if (currentFilter !== 'all') return c.severity === currentFilter;
      return true;
    }).filter(c =>
      !searchQuery ||
      c.title.toLowerCase().includes(searchQuery) ||
      c.category.toLowerCase().includes(searchQuery) ||
      (c.description && c.description.toLowerCase().includes(searchQuery))
    );
    
    document.getElementById('complaintCount').textContent = items.length;
    
    // Update Stats Bar
    document.getElementById('statTotal').textContent = data.length;
    document.getElementById('statHigh').textContent = data.filter(c => c.severity === 'high').length;
    document.getElementById('statMedium').textContent = data.filter(c => c.severity === 'medium').length;
    document.getElementById('statLow').textContent = data.filter(c => c.severity === 'low').length;

    list.innerHTML = items.map(c => `
      <div class="complaint-mini" onclick="flyTo(${c.location.lat},${c.location.lng})">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
          <span style="font-size:0.7rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;">${c.category}</span>
          <div style="display:flex;gap:5px;align-items:center;">
            ${c.boosted ? '<span class="priority-badge">⚡ High Priority</span>' : ''}
            ${c.verified
              ? '<span style="background:rgba(34,197,94,0.10);color:#15803D;border:1px solid rgba(34,197,94,0.22);padding:1px 8px;border-radius:20px;font-size:0.68rem;font-weight:700;">✓ Verified</span>'
              : '<span style="background:rgba(239,68,68,0.10);color:#B91C1C;border:1px solid rgba(239,68,68,0.22);padding:1px 8px;border-radius:20px;font-size:0.68rem;font-weight:700;">⚠ Suspicious</span>'
            }
          </div>
        </div>
        <div style="font-weight:700;font-size:0.875rem;margin-bottom:5px;">${c.title}</div>
        <div style="display:flex;align-items:center;gap:8px;font-size:0.75rem;color:var(--text-muted);">
          <span style="color:${getSeverityColor(c.severity)}">● ${c.severity.charAt(0).toUpperCase()+c.severity.slice(1)}</span>
          <span>·</span>
          <span>${getStatusIcon(c.status)} ${c.status.charAt(0).toUpperCase()+c.status.slice(1)}</span>
          <span>·</span>
          <span>👍 ${c.votes}</span>
        </div>
      </div>
    `).join('') || '<div class="empty-state" style="padding:32px 20px;"><div class="empty-state-icon">🗺️</div><div class="empty-state-title">No complaints match</div><div class="empty-state-desc">Try a different filter</div></div>';
  }

  function flyTo(lat, lng) {
    if (civicMap) civicMap.flyTo([lat, lng], 16, { duration: 1.2 });
  }

  function locateMe() {
    if (!navigator.geolocation) { Toast.error('Not Supported', 'Geolocation unavailable'); return; }
    Toast.info('Detecting Location...', 'Please allow location access');
    navigator.geolocation.getCurrentPosition(pos => {
      civicMap.flyTo([pos.coords.latitude, pos.coords.longitude], 15, { duration: 1.5 });
      Toast.success('Located!', 'Map centered to your location');
    }, err => Toast.error('Location Error', err.message));
  }

  function toggleHeatmap() {
    if (typeof window.toggleHeatLayer === 'function') {
      window.toggleHeatLayer();
    }
  }

  // Filter chips
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', function() {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
      currentFilter = this.dataset.filter;
      if (typeof window.liveIssues !== 'undefined') {
        renderSidebarList(window.liveIssues);
        if (typeof window.filterMarkersInfo === 'function') {
          window.filterMarkersInfo(currentFilter);
        }
      }
    });
  });

  // Search
  document.getElementById('searchComplaints').addEventListener('input', function() {
    searchQuery = this.value.toLowerCase().trim();
    if (typeof window.liveIssues !== 'undefined') {
      renderSidebarList(window.liveIssues);
    }
  });
</script>

<!-- Firebase UMD libraries for map integration -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    initMap('mainMap', 30.7046, 76.7179, 12);
    
    // Connect to Firestore and populate dynamically (logic now in map.js)
    if (typeof window.initLiveMap === 'function') {
      window.initLiveMap();
    } else {
      console.error("initLiveMap not defined in map.js");
    }
  });
</script>
</body>
</html>
