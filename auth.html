<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – CivicEye</title>
  <meta name="description" content="Sign in or create a free account to report civic issues, track complaints and engage with your community." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👁️</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', sans-serif; }

    /* ── Background ── */
    body {
      min-height: 100vh;
      background: linear-gradient(150deg, #05080f 0%, #0F172A 45%, #0a1020 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 20px; position: relative; overflow-x: hidden;
    }
    .bg-blob {
      position: fixed; border-radius: 50%; filter: blur(100px);
      pointer-events: none; z-index: 0; animation: blobDrift 14s ease-in-out infinite alternate;
    }
    .bg-blob-1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(79,70,229,0.22), transparent 70%);
      top: -200px; right: -100px; animation-delay: 0s;
    }
    .bg-blob-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(20,184,166,0.18), transparent 70%);
      bottom: -120px; left: -120px; animation-delay: -5s;
    }
    .bg-blob-3 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(30,58,138,0.25), transparent 70%);
      top: 40%; left: 30%; animation-delay: -9s;
    }
    @keyframes blobDrift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 40px) scale(1.08); }
    }

    /* Grid overlay */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(79,70,229,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,70,229,0.05) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    /* ── Card ── */
    .auth-card {
      position: relative; z-index: 10;
      background: rgba(13, 20, 40, 0.82);
      backdrop-filter: blur(36px) saturate(200%);
      -webkit-backdrop-filter: blur(36px) saturate(200%);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 28px;
      padding: 48px 44px 40px;
      width: 100%; max-width: 460px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.55), 0 0 80px rgba(79,70,229,0.10);
      animation: cardIn 0.65s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(36px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Logo ── */
    .auth-logo { text-align: center; margin-bottom: 30px; }
    .auth-logo-icon {
      width: 68px; height: 68px; border-radius: 20px;
      background: linear-gradient(135deg, #1E3A8A, #4F46E5 60%, #14B8A6);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin: 0 auto 14px;
      box-shadow: 0 12px 40px rgba(79,70,229,0.45);
    }
    .auth-logo h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.65rem; font-weight: 900; color: white;
      letter-spacing: -0.04em; margin-bottom: 6px;
    }
    .auth-logo p { font-size: 0.85rem; color: rgba(255,255,255,0.50); line-height: 1.5; }

    /* ── Tabs ── */
    .auth-tabs {
      display: flex; background: rgba(255,255,255,0.05);
      border-radius: 14px; padding: 4px; margin-bottom: 26px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .auth-tab {
      flex: 1; padding: 10px 8px; text-align: center;
      color: rgba(255,255,255,0.50); font-weight: 600; font-size: 0.88rem;
      border-radius: 10px; cursor: pointer; transition: all 0.22s; border: none;
      background: transparent; font-family: 'Inter', sans-serif;
    }
    .auth-tab.active {
      background: rgba(79,70,229,0.28); color: white;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    /* ── Google Button ── */
    .google-btn {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 14px 20px;
      background: white; color: #1f1f1f;
      border: none; border-radius: 14px;
      font-size: 0.97rem; font-weight: 700; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: all 0.25s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      margin-bottom: 20px;
    }
    .google-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(0,0,0,0.25);
      background: #f8f8f8;
    }
    .google-btn:active { transform: translateY(0); }
    .google-btn:disabled { opacity: 0.7; pointer-events: none; }
    .google-btn svg { flex-shrink: 0; }

    /* ── Divider ── */
    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 0 0 20px;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.10);
    }
    .or-divider span { font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.30); white-space: nowrap; }

    /* ── Forms ── */
    .auth-form { display: none; flex-direction: column; gap: 14px; }
    .auth-form.active { display: flex; animation: fadeSlideUp 0.35s ease; }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .dark-input-group { position: relative; }
    .dark-input {
      width: 100%; padding: 13px 16px 13px 46px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.10);
      border-radius: 12px; color: white;
      font-size: 0.95rem; font-family: 'Inter', sans-serif;
      transition: all 0.2s; outline: none;
    }
    .dark-input::placeholder { color: rgba(255,255,255,0.30); }
    .dark-input:focus {
      border-color: #4F46E5;
      background: rgba(79,70,229,0.10);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.18);
    }
    .dark-input.error { border-color: rgba(239,68,68,0.60); }
    .dark-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.35); font-size: 1.05rem;
      pointer-events: none;
    }

    .auth-btn {
      width: 100%; padding: 14px; border-radius: 12px;
      background: linear-gradient(135deg, #1E3A8A, #4F46E5);
      color: white; font-weight: 700; font-size: 1rem;
      font-family: 'Inter', sans-serif;
      border: none; cursor: pointer; transition: all 0.25s;
      box-shadow: 0 6px 20px rgba(79,70,229,0.40);
      margin-top: 4px;
    }
    .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(79,70,229,0.55); }
    .auth-btn:active { transform: none; }
    .auth-btn:disabled { opacity: 0.70; pointer-events: none; }

    /* ── Admin Role Toggle ── */
    .role-toggle {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.09);
      padding: 13px 16px; border-radius: 12px;
    }
    .role-toggle-label { color: rgba(255,255,255,0.80); font-weight: 600; font-size: 0.88rem; display: flex; align-items: center; gap: 8px; }
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.15); transition: .3s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background: #4F46E5; }
    input:checked + .slider:before { transform: translateX(20px); }

    .admin-fields {
      display: none; background: rgba(79,70,229,0.07);
      border: 1px solid rgba(79,70,229,0.22); padding: 14px; border-radius: 12px;
    }
    .admin-fields.active { display: block; animation: fadeSlideUp 0.3s; }
    .dark-select {
      width: 100%; padding: 12px 14px;
      background: rgba(15,23,42,0.85);
      border: 1.5px solid rgba(79,70,229,0.35); border-radius: 10px;
      color: white; font-size: 0.88rem; cursor: pointer; outline: none;
      font-family: 'Inter', sans-serif; margin-top: 8px;
    }

    /* ── Back / Switch links ── */
    .auth-switch {
      text-align: center; margin-top: 20px;
      font-size: 0.82rem; color: rgba(255,255,255,0.40);
    }
    .auth-switch a { color: #818CF8; font-weight: 600; text-decoration: none; }
    .auth-switch a:hover { text-decoration: underline; }

    .back-link {
      text-align: center; margin-top: 24px; padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .back-link a { font-size: 0.82rem; color: rgba(255,255,255,0.35); text-decoration: none; }
    .back-link a:hover { color: rgba(255,255,255,0.60); }

    /* ── Toast ── */
    #toast-container {
      position: fixed; top: 20px; right: 20px; z-index: 9999;
      display: flex; flex-direction: column; gap: 10px;
    }
    .auth-toast {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; min-width: 280px;
      background: rgba(13,20,40,0.96); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.10); border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.50);
      animation: toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
      border-left: 4px solid #4F46E5;
    }
    .auth-toast.success { border-left-color: #22C55E; }
    .auth-toast.error   { border-left-color: #EF4444; }
    .auth-toast-msg { font-size: 0.88rem; color: white; font-weight: 600; }
    .auth-toast.hiding { animation: toastOut 0.25s ease forwards; }
    @keyframes toastIn  { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:none; } }
    @keyframes toastOut { to   { opacity:0; transform:translateX(20px); } }

    /* ── Loading spinner ── */
    .spinner-inline {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2.5px solid rgba(0,0,0,0.15);
      border-top-color: #4F46E5;
      animation: spin 0.65s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Security strip ── */
    .security-strip {
      display: flex; justify-content: center; gap: 20px; margin-top: 20px;
    }
    .security-item { font-size: 0.72rem; color: rgba(255,255,255,0.25); display: flex; align-items: center; gap: 4px; }

    @media (max-width: 500px) {
      .auth-card { padding: 36px 22px 30px; }
    }
  </style>
</head>
<body>

<!-- Background -->
<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>
<div class="bg-blob bg-blob-3"></div>
<div class="bg-grid"></div>

<div id="toast-container"></div>

<div class="auth-card">

  <!-- Logo -->
  <div class="auth-logo">
    <div class="auth-logo-icon">👁️</div>
    <h1>CivicEye</h1>
    <p>India's Trust-Driven Civic Platform</p>
  </div>

  <!-- Tabs -->
  <div class="auth-tabs">
    <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
    <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Create Account</button>
  </div>

  <!-- ── GOOGLE SIGN-IN (always visible, works for both tabs) ── -->
  <button class="google-btn" id="googleBtn" onclick="handleGoogleSignIn()">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <div class="or-divider"><span>OR CONTINUE WITH EMAIL</span></div>

  <!-- ── LOGIN FORM ── -->
  <form id="loginForm" class="auth-form active" novalidate>
    <div class="dark-input-group">
      <span class="dark-icon">📧</span>
      <input type="email" id="loginEmail" class="dark-input" placeholder="Email Address" autocomplete="email" required />
    </div>
    <div class="dark-input-group">
      <span class="dark-icon">🔑</span>
      <input type="password" id="loginPassword" class="dark-input" placeholder="Password" autocomplete="current-password" required />
    </div>
    <button type="submit" class="auth-btn" id="loginBtn">Sign In →</button>
  </form>

  <!-- ── SIGNUP FORM ── -->
  <form id="signupForm" class="auth-form" novalidate>
    <div class="dark-input-group">
      <span class="dark-icon">👤</span>
      <input type="text" id="signupName" class="dark-input" placeholder="Full Name" autocomplete="name" required />
    </div>
    <div class="dark-input-group">
      <span class="dark-icon">📧</span>
      <input type="email" id="signupEmail" class="dark-input" placeholder="Email Address" autocomplete="email" required />
    </div>
    <div class="dark-input-group">
      <span class="dark-icon">🔑</span>
      <input type="password" id="signupPassword" class="dark-input" placeholder="Create Password (min 6 chars)" autocomplete="new-password" required />
    </div>

    <!-- Admin Toggle -->
    <div class="role-toggle">
      <div class="role-toggle-label"><span>🛡️</span> Register as Municipal Admin?</div>
      <label class="switch">
        <input type="checkbox" id="adminToggle" onchange="toggleAdminFields()">
        <span class="slider"></span>
      </label>
    </div>

    <div class="admin-fields" id="adminFields">
      <div style="font-size:0.8rem;color:rgba(255,255,255,0.55);margin-bottom:4px;">Select your department:</div>
      <select id="adminCategory" class="dark-select">
        <option value="Roads">🛣️ Roads &amp; Potholes</option>
        <option value="Garbage">🗑️ Garbage &amp; Sanitation</option>
        <option value="Water Supply">💧 Water Supply</option>
        <option value="Electricity">⚡ Electricity</option>
        <option value="Others">🏛️ General / Others</option>
      </select>
    </div>

    <button type="submit" class="auth-btn" id="signupBtn">Create Account →</button>
  </form>

  <!-- Switch tab link -->
  <div class="auth-switch" id="switchText">
    Don't have an account? <a href="#" onclick="switchTab('signup');return false;">Sign up free</a>
  </div>

  <!-- Security strip -->
  <div class="security-strip">
    <span class="security-item">🔒 Firebase Auth</span>
    <span class="security-item">🛡️ Encrypted</span>
    <span class="security-item">📡 Secure</span>
  </div>

  <div class="back-link">
    <a href="index.html">← Back to CivicEye Home</a>
  </div>

</div>

<script>
  /* ── Tab switching ── */
  function switchTab(tab) {
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
    document.getElementById('loginForm').classList.toggle('active', tab === 'login');
    document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
    document.getElementById('switchText').innerHTML = tab === 'login'
      ? 'Don\'t have an account? <a href="#" onclick="switchTab(\'signup\');return false;">Sign up free</a>'
      : 'Already have an account? <a href="#" onclick="switchTab(\'login\');return false;">Sign in</a>';
    // Update Google button label based on context
    document.getElementById('googleBtn').childNodes[2].textContent =
      tab === 'login' ? ' Continue with Google' : ' Sign up with Google';
  }

  /* ── Admin fields toggle ── */
  function toggleAdminFields() {
    document.getElementById('adminFields').classList.toggle(
      'active', document.getElementById('adminToggle').checked
    );
  }

  /* ── Toast helper (shared with auth.js) ── */
  window.showAuthToast = function(msg, type = 'info') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `auth-toast ${type}`;
    t.innerHTML = `<span class="auth-toast-msg">${msg}</span>`;
    c.appendChild(t);
    setTimeout(() => { t.classList.add('hiding'); setTimeout(() => t.remove(), 300); }, 4000);
  };
</script>

<!-- Firebase Auth module -->
<script type="module" src="js/auth.js"></script>

</body>
</html>
