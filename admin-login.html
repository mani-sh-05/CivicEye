<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – CivicEye Control Center</title>
  <meta name="description" content="CivicEye Admin Portal – Secure login for municipal administrators to manage civic complaints and resolutions." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 24px;
    }

    /* Animated background */
    .login-bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(150deg, #0A0F1E 0%, #0F172A 40%, #1A0E2E 70%, #0A1628 100%);
      z-index: 0;
    }
    .login-bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      animation: blobFloat 12s ease-in-out infinite alternate;
    }
    .login-bg-blob-1 {
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(79,70,229,0.25), transparent 70%);
      top: -300px; right: -200px;
      animation-delay: 0s;
    }
    .login-bg-blob-2 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(20,184,166,0.20), transparent 70%);
      bottom: -200px; left: -150px;
      animation-delay: -4s;
    }
    .login-bg-blob-3 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(30,58,138,0.30), transparent 70%);
      top: 40%; left: 35%;
      animation-delay: -8s;
    }
    @keyframes blobFloat {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 40px) scale(1.1); }
    }

    /* Grid dots */
    .login-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,70,229,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,70,229,0.06) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    /* Login Card */
    .login-card {
      position: relative;
      z-index: 10;
      background: rgba(15, 23, 42, 0.80);
      backdrop-filter: blur(32px) saturate(180%);
      -webkit-backdrop-filter: blur(32px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.50), 0 0 60px rgba(79,70,229,0.12);
      animation: slideUp 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-logo-icon {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 16px;
      box-shadow: 0 12px 40px rgba(79,70,229,0.45);
      position: relative;
    }
    .login-logo-icon::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--secondary), var(--accent));
      z-index: -1;
      opacity: 0.5;
    }
    .login-logo h1 {
      font-size: 1.6rem;
      font-weight: 900;
      color: white;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }
    .login-logo p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
    }

    .admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(79,70,229,0.18);
      border: 1px solid rgba(79,70,229,0.35);
      color: #818CF8;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 16px;
    }

    /* Dark form inputs */
    .dark-input-group { position: relative; margin-bottom: 18px; }
    .dark-input {
      width: 100%;
      padding: 14px 16px 14px 46px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      color: white;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
      outline: none;
    }
    .dark-input::placeholder { color: rgba(255,255,255,0.35); }
    .dark-input:focus {
      border-color: var(--secondary);
      background: rgba(79,70,229,0.10);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.18);
    }
    .dark-input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 1rem; color: rgba(255,255,255,0.40); pointer-events: none;
    }
    .dark-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(255,255,255,0.70);
      margin-bottom: 8px;
    }
    .dark-hint {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.35);
      margin-top: 5px;
    }

    /* Login button */
    .login-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #1E3A8A, #4F46E5);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 28px rgba(79,70,229,0.45);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 40px rgba(79,70,229,0.60);
    }
    .login-btn:active { transform: scale(0.98); }
    .login-btn.loading {
      pointer-events: none;
      opacity: 0.80;
    }
    .login-btn .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.30);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      display: none;
    }
    .login-btn.loading .spinner { display: block; }
    .login-btn.loading .btn-text { opacity: 0.70; }

    .demo-btn {
      width: 100%;
      padding: 13px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.75);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 12px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .demo-btn:hover {
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.22);
      color: white;
    }

    .divider-or {
      display: flex; align-items: center; gap: 12px;
      color: rgba(255,255,255,0.25); font-size: 0.8rem;
      margin: 18px 0;
    }
    .divider-or::before, .divider-or::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(255,255,255,0.10);
    }

    .user-link {
      text-align: center;
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid rgba(255,255,255,0.07);
      font-size: 0.85rem;
      color: rgba(255,255,255,0.40);
    }
    .user-link a {
      color: #818CF8;
      font-weight: 600;
      transition: color 0.15s;
    }
    .user-link a:hover { color: #A5B4FC; }

    /* Error state */
    .field-error {
      font-size: 0.78rem;
      color: #F87171;
      margin-top: 5px;
      display: none;
    }
    .dark-input.error { border-color: rgba(239,68,68,0.55); }

    /* Security badges */
    .security-strip {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 28px;
    }
    .security-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.32);
    }

    /* Toast for dark bg */
    #admin-toast-container {
      position: fixed;
      top: 24px; right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .admin-toast {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: rgba(15,23,42,0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.50);
      min-width: 300px;
      animation: toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
      border-left: 4px solid #4F46E5;
    }
    .admin-toast.error { border-left-color: #EF4444; }
    .admin-toast.success { border-left-color: #22C55E; }
    .admin-toast-title { font-weight: 700; font-size: 0.9rem; color: white; }
    .admin-toast-msg { font-size: 0.82rem; color: rgba(255,255,255,0.55); margin-top: 2px; }
    .admin-toast.hiding { animation: toastOut 0.25s ease forwards; }
  </style>
</head>
<body>

<div class="login-bg">
  <div class="login-bg-blob login-bg-blob-1"></div>
  <div class="login-bg-blob login-bg-blob-2"></div>
  <div class="login-bg-blob login-bg-blob-3"></div>
</div>
<div class="login-grid"></div>

<div id="admin-toast-container"></div>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-icon">🛡️</div>
      <div class="admin-badge">🔒 Secure Admin Portal</div>
      <h1>CivicEye Admin</h1>
      <p>Municipal Control Center — Sign in with your admin credentials</p>
    </div>

    <form id="loginForm" novalidate>
      <div>
        <label class="dark-label" for="adminEmail">Admin Email</label>
        <div class="dark-input-group">
          <span class="dark-input-icon">📧</span>
          <input
            type="email"
            id="adminEmail"
            class="dark-input"
            placeholder="admin@municipal.gov.in"
            autocomplete="email"
          />
        </div>
        <div class="field-error" id="emailError">Please enter a valid email address</div>
      </div>

      <div>
        <label class="dark-label" for="adminPassword">Password</label>
        <div class="dark-input-group">
          <span class="dark-input-icon">🔑</span>
          <input
            type="password"
            id="adminPassword"
            class="dark-input"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
        </div>
        <div class="field-error" id="passError">Password is required</div>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        <div class="spinner"></div>
        <span class="btn-text">🔐 Sign In to Admin Panel</span>
      </button>
    </form>

    <div class="divider-or">or</div>

    <button class="demo-btn" id="demoBtn">
      ⚡ Login as Demo Admin
    </button>

    <div class="security-strip">
      <div class="security-item">🔒 256-bit SSL</div>
      <div class="security-item">🛡️ Secure Auth</div>
      <div class="security-item">📡 Encrypted</div>
    </div>

    <div class="user-link">
      Not an admin? <a href="index.html">← Back to CivicEye</a>
    </div>
  </div>
</div>

<script>
  // ─── Admin credentials ─────────────────────────────────────────────
  const VALID_ADMINS = [
    { email: 'admin@civiceye.in',     pass: 'Admin@123',  name: 'Rahul Verma' },
    { email: 'roads@municipal.gov.in', pass: 'Roads@456',  name: 'Priya Mehta' },
    { email: 'demo@civiceye.in',      pass: 'demo1234',   name: 'Demo Admin'  }
  ];

  function showToast(title, msg, type = 'info') {
    const c = document.getElementById('admin-toast-container');
    const t = document.createElement('div');
    t.className = `admin-toast ${type}`;
    t.innerHTML = `
      <div>
        <div class="admin-toast-title">${title}</div>
        <div class="admin-toast-msg">${msg}</div>
      </div>`;
    c.appendChild(t);
    setTimeout(() => { t.classList.add('hiding'); setTimeout(() => t.remove(), 300); }, 3500);
  }

  function validateAndLogin(email, pass) {
    const btn = document.getElementById('loginBtn');
    btn.classList.add('loading');

    setTimeout(() => {
      const admin = VALID_ADMINS.find(a => a.email === email.trim().toLowerCase() && a.pass === pass);
      btn.classList.remove('loading');

      if (admin) {
        localStorage.setItem('civiceye_admin', JSON.stringify({ email: admin.email, name: admin.name, loggedIn: true, loginTime: Date.now() }));
        showToast('✅ Login Successful', `Welcome back, ${admin.name}!`, 'success');
        setTimeout(() => {
          const profile = JSON.parse(localStorage.getItem('civiceye_admin_profile') || 'null');
          window.location.href = profile ? 'admin-panel.html' : 'admin-setup.html';
        }, 900);
      } else {
        showToast('❌ Login Failed', 'Invalid email or password. Please try again.', 'error');
        document.getElementById('adminEmail').classList.add('error');
        document.getElementById('adminPassword').classList.add('error');
        document.getElementById('adminPassword').value = '';
      }
    }, 1200);
  }

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('adminEmail').value;
    const pass  = document.getElementById('adminPassword').value;

    // Reset errors
    ['adminEmail','adminPassword'].forEach(id => document.getElementById(id).classList.remove('error'));
    document.getElementById('emailError').style.display = 'none';
    document.getElementById('passError').style.display  = 'none';

    let valid = true;
    if (!email || !/\S+@\S+\.\S+/.test(email)) {
      document.getElementById('emailError').style.display = 'block';
      document.getElementById('adminEmail').classList.add('error');
      valid = false;
    }
    if (!pass) {
      document.getElementById('passError').style.display = 'block';
      document.getElementById('adminPassword').classList.add('error');
      valid = false;
    }
    if (!valid) return;

    validateAndLogin(email, pass);
  });

  document.getElementById('demoBtn').addEventListener('click', function() {
    document.getElementById('adminEmail').value = 'demo@civiceye.in';
    document.getElementById('adminPassword').value = 'demo1234';
    showToast('⚡ Demo Mode', 'Filling in demo credentials…', 'info');
    setTimeout(() => validateAndLogin('demo@civiceye.in', 'demo1234'), 600);
  });

  // Clear error on input
  ['adminEmail','adminPassword'].forEach(id => {
    document.getElementById(id).addEventListener('input', function() {
      this.classList.remove('error');
    });
  });

  // Redirect if already logged in
  window.addEventListener('DOMContentLoaded', () => {
    const admin = JSON.parse(localStorage.getItem('civiceye_admin') || 'null');
    if (admin && admin.loggedIn) {
      const profile = JSON.parse(localStorage.getItem('civiceye_admin_profile') || 'null');
      window.location.href = profile ? 'admin-panel.html' : 'admin-setup.html';
    }
  });
</script>
</body>
</html>
